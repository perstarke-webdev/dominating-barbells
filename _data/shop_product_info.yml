power_to_lift_oversized:
  teaser: "Erlebe die Power to Lift Mentalität: ein T-Shirt, das nicht nur Qualität, sondern auch deine Werte repräsentiert."
  highlights:
    - "Zeige, was in dir steckt, mit dem großen Power to Lift Backprint."
    - "Qualität im Training und im Alltag."
    - "100 % hochwertige Baumwolle und ein optimales Oversized Fitting."
  sizes: "XS-5XL"

power_to_lift_performance:
  teaser: "Erlebe die Power to Lift Mentalität und erfahre, wo wahre Power entsteht."
  highlights:
    - "Jeder sieht das Ergebnis, aber niemand den Weg, den du dafür gegangen bist."
    - "Zeige deine Werte im Training und im Alltag."
    - "Schweißabweisendes Material, optimal für dein Training."
    - "Ein angepasster Fit, der zeigt, wo deine Stärken liegen."
  sizes: "S-3XL"

